version: 2

project_name: papermap

before:
  hooks:
    - go mod tidy

builds:
  - id: papermap
    main: ./cmd/papermap
    binary: papermap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: papermap
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Papermap-ai
    name: papermap-tui
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - name: papermap
    ids:
      - papermap
    repository:
      owner: Papermap-ai
      name: homebrew-papermap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Papermap-ai/papermap-tui"
    description: "Terminal-native client for Papermap insights"
    license: "MIT"
    commit_author:
      name: papermap-bot
      email: bot@papermap.ai
    install: |
      bin.install "papermap"
    test: |
      assert_match version.to_s, shell_output("#{bin}/papermap --version")
