name: release

on:
  # Manual rerun for a specific tag (use this to backfill releases whose
  # archives were never uploaded, e.g. when release-please cut the tag
  # before this pipeline was wired up).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Defaults to current ref."
        required: false
        type: string

  # Direct tag pushes from a developer machine still trigger a release.
  push:
    tags:
      - "v*"

  # Invoked by release-please.yml after it cuts a release. Using
  # workflow_call (instead of relying on the tag-push event) sidesteps the
  # GitHub rule that workflows triggered via GITHUB_TOKEN do not start
  # other workflow runs.
  workflow_call:
    inputs:
      tag:
        description: "Tag to release."
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target ref
        id: ref
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
